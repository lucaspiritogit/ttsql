services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: app
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
    ports:
      - "5432:5432"
    volumes:
      - ./data.csv:/seed/data.csv
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d app"]
      interval: 5s
      timeout: 5s
      retries: 10

  ollama:
    image: ollama/ollama:latest
    environment:
      OLLAMA_KEEP_ALIVE: "-1"
    volumes:
      - ollama:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 5s
      timeout: 5s
      retries: 30

  model-init:
    image: ollama/ollama:latest
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: http://ollama:11434
    volumes:
      - ollama:/root/.ollama
    entrypoint: ["/bin/sh", "-c"]
    command: >
      "echo 'Pulling SQL generation model...';
      ollama pull pxlksr/defog_sqlcoder-7b-2:Q2_KS;
      echo 'Pulling explanation model...';
      ollama pull qwen2.5-coder:1.5b;
      echo 'Models ready.'"

  model-warmup:
    image: curlimages/curl:8.11.1
    depends_on:
      ollama:
        condition: service_healthy
      model-init:
        condition: service_completed_successfully
    environment:
      SQL_MODEL: pxlksr/defog_sqlcoder-7b-2:Q2_KS
      EXPLANATION_MODEL: qwen2.5-coder:1.5b
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        echo "Preloading $$SQL_MODEL..."
        curl -sfS http://ollama:11434/api/generate -d "{\"model\":\"$$SQL_MODEL\"}" -o /dev/null
        echo "Preloading $$EXPLANATION_MODEL..."
        curl -sfS http://ollama:11434/api/generate -d "{\"model\":\"$$EXPLANATION_MODEL\"}" -o /dev/null
        echo "Preload done."
    restart: "no"

  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    environment:
      DATABASE_URL: postgresql://app:app@db:5432/app
      OLLAMA_URL: http://ollama:11434
      MODEL_NAME: pxlksr/defog_sqlcoder-7b-2:Q2_KS
      EXPLANATION_MODEL_NAME: qwen2.5-coder:1.5b
    depends_on:
      db:
        condition: service_healthy
      model-warmup:
        condition: service_completed_successfully
    ports:
      - "8000:8000"

  client:
    profiles: ["client"]
    build:
      context: .
      dockerfile: apps/client/Dockerfile
    environment:
      API_URL: http://server:8000
    depends_on:
      - server
    stdin_open: true
    tty: true

volumes:
  ollama:
